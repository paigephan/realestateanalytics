<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Back Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #13161e;
      --border: rgba(255,255,255,0.07);
      --text: #e8eaf0;
      --muted: #6b7280;
      --accent: #f5c542;
      --glow: rgba(245, 197, 66, 0.15);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* background grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* soft glow blob */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--glow) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50%       { opacity: 1;   transform: translate(-50%, -50%) scale(1.1); }
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 56px 52px;
      max-width: 520px;
      width: 90%;
      text-align: center;
      box-shadow: 0 0 60px rgba(0,0,0,0.5), 0 0 0 1px var(--border);
      animation: fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .icon {
      font-size: 2.4rem;
      margin-bottom: 24px;
      display: block;
      animation: spin 6s linear infinite;
    }

    @keyframes spin {
      0%   { transform: rotate(0deg); }
      10%  { transform: rotate(20deg); }
      20%  { transform: rotate(0deg); }
      100% { transform: rotate(0deg); }
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2.2rem;
      font-weight: 400;
      line-height: 1.2;
      margin-bottom: 16px;
      color: var(--text);
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .divider {
      width: 48px;
      height: 2px;
      background: var(--accent);
      margin: 20px auto;
      border-radius: 2px;
      opacity: 0.7;
    }

    p {
      font-size: 1rem;
      line-height: 1.7;
      color: var(--muted);
      font-weight: 300;
    }

    .time-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 28px;
      background: rgba(245,197,66,0.08);
      border: 1px solid rgba(245,197,66,0.25);
      border-radius: 99px;
      padding: 10px 20px;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 0.03em;
    }

    .time-badge::before {
      content: '⏱';
      font-size: 1rem;
    }

    .footer {
      margin-top: 36px;
      font-size: 0.78rem;
      color: rgba(107,114,128,0.5);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">🔧</span>
    <h1>We'll be <em>right back</em></h1>
    <div class="divider"></div>
    <p>
      Our site is temporarily offline due to a database connectivity issue on our cloud server.
      We're aware of the problem and everything will be restored shortly.
    </p>
    <div class="time-badge">Back online after 1:00 AM today</div>
    <p class="footer">Thank you for your patience</p>
  </div>
</body>
</html>
